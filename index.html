<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 04/05💖</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #login {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff9ad5, #ff5fa2);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      color: white;
    }

    #login h2 {
      margin-bottom: 15px;
      font-size: 28px;
    }

    #login input {
      padding: 12px;
      border-radius: 25px;
      border: none;
      text-align: center;
      font-size: 18px;
      outline: none;
    }

    #login button {
      margin-top: 15px;
      padding: 10px 25px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4fa3;
      font-weight: bold;
      cursor: pointer;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
    }

    .screen {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .title {
      font-size: 60px;
      color: white;
      text-shadow: 0 0 15px #ff7bd5;
      animation: zoom 2s ease forwards;
    }

    #countdown {
      margin-top: 15px;
      font-size: 24px;
      color: white;
      text-shadow: 0 0 10px #ff4fa3;
    }

    @keyframes zoom {
      from {
        transform: scale(0.2);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      background: #ff4fa3;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      display: none;
      width: 90%;
      max-width: 700px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 30px #ff69b4;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .card h2 {
      color: #ff4fa3;
    }

    .heart {
      position: fixed;
      color: #ff5fa2;
      font-size: 25px;
      animation: fly 4s linear forwards;
      z-index: 5;
    }

    @keyframes fly {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }



    /* ===== LOVE WORD SEARCH GAME ===== */
    #gameScreen {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffb6df, #ffd6ec);
      user-select: none;
      overflow: auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .love-game {
      width: min(760px, 96vw);
      background: #ffc1e3;
      border-radius: 25px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 80, 160, 0.4);
      position: relative;
    }

    .love-game h1 {
      color: white;
      text-shadow: 0 0 8px #ff4fa3;
      margin-bottom: 15px;
      letter-spacing: 2px;
      font-size: 30px;
    }

    .love-board {
      display: grid;
      grid-template-columns: repeat(12, 38px);
      justify-content: center;
      gap: 4px;
      margin: 20px auto;
    }

    .love-cell {
      width: 38px;
      height: 38px;
      background: #fff2fa;
      border: 2px solid #ff8ac8;
      border-radius: 8px;
      color: #9b2b68;
      font-weight: bold;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-sizing: border-box;
    }

    .love-cell.selected {
      background: #ff69b4;
      color: white;
    }

    .love-cell.found {
      background: #ff1493;
      color: white;
      box-shadow: 0 0 10px #ff1493;
    }

    .love-words {
      margin-top: 15px;
      background: #ff8ac8;
      border-radius: 18px;
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .love-word {
      color: white;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 0 5px #d60073;
    }

    .love-word.done {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .love-message {
      color: white;
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
      text-shadow: 0 0 8px #ff1493;
    }

    .game-heart {
      position: absolute;
      font-size: 42px;
      animation: gameFloat 3s infinite ease-in-out;
      z-index: 1;
    }

    .game-heart.h1 {
      top: 30px;
      left: 25px;
    }

    .game-heart.h2 {
      top: 60px;
      right: 35px;
    }

    .game-heart.h3 {
      bottom: 40px;
      left: 35px;
    }

    .game-heart.h4 {
      bottom: 45px;
      right: 40px;
    }

    .back-btn {
      background: linear-gradient(45deg, #ff4fa3, #ff8ac8);
      box-shadow: 0 0 18px rgba(255, 105, 180, 0.55);
      font-weight: bold;
    }

    @keyframes gameFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @media (max-width: 560px) {
      .love-game {
        padding: 16px;
      }

      .love-board {
        grid-template-columns: repeat(12, 25px);
        gap: 3px;
      }

      .love-cell {
        width: 25px;
        height: 25px;
        font-size: 14px;
        border-radius: 6px;
      }

      .love-words {
        grid-template-columns: repeat(2, 1fr);
      }

      .love-game h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <button id="playPauseBtn" onclick="togglePlayPause()" style="
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.9);
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
  ">▶️</button>

  <audio id="bgMusic" autoplay loop>
    <source src="taylor_decoded.mp3" type="audio/mpeg">
  </audio>

  <div id="login">
    <!-- <h2>Nhập mật khẩu 💖</h2> -->
    <input type="password" id="pass" placeholder="Nhập mật khẩu 💖" onkeydown="if(event.key === 'Enter') checkPass()">
    <button onclick="checkPass()">Mở quà 🎁</button>
  </div>

  <canvas id="matrix"></canvas>

  <div class="screen" id="main">
    <div class="title">Happy Birthday 04/05💕</div>

    <div id="countdown"></div>

    <button id="openGiftBtn" onclick="openGift()">Nhấn vào đây 🎂</button>

    <div class="card" id="card">
      <!-- <div class="video-container" style="flex: 1; min-width: 250px;">
        <video controls autoplay loop muted style="width: 100%; border-radius: 15px; max-height: 70vh;">
          <source src="birthday-video.mp4" type="video/mp4">
          Trình duyệt của bạn không hỗ trợ video.
        </video>
      </div> -->

      <div class="card-content" style="flex: 1; min-width: 250px;">
        <img id="preview" src="https://i.pinimg.com/originals/dc/15/9d/dc159d5c6e618b345e234b6ed9e8b4af.gif"
          style="height:200px; width:auto;">

        <h2>Gửi Sếp nhỏ iu dấu 💖</h2>
        <p>
          🎂 Nhân dịp sinh nhật, anh xin chúc em luôn xinh gái, tiền vào như nước sông Đà, tiền ra nhỏ giọt như cà phê
          phin💸 Mãi yêu em ❤️
        </p>
        <button id="gameBtn" onclick="showGame()">🎮 Chơi game</button>
      </div>
    </div>
  </div>
  <button id="videoBtn" onclick="openVideoPopup()" style="
  display: none;
  position: fixed;
  bottom: 25px;
  right: 25px;
  z-index: 50;
  padding: 14px 22px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4fa3, #ff8ac8);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px #ff69b4;
">
    🎬 Tổng hợp video kỷ niệm
  </button>

  <div id="videoPopup" style="
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
">

    <div style="
    width:90%;
    height:80%;
    background:#000;
    border-radius:15px;
    overflow:hidden;
    position:relative;
  ">

      <span onclick="closeVideoPopup()" style="
      position:absolute;
      top:10px;
      right:15px;
      color:white;
      font-size:30px;
      cursor:pointer;
      z-index:1000;
    ">✖</span>

      <iframe id="videoFrame" width="100%" height="100%" frameborder="0">
      </iframe>

    </div>
  </div>


  <div id="gameScreen">
    <div class="love-game">
      <div class="game-heart h1">💖</div>
      <div class="game-heart h2">💛</div>
      <div class="game-heart h3">🧡</div>
      <div class="game-heart h4">💕</div>

      <h1>LOVE WORD SEARCH GAME</h1>
      <div class="love-board" id="loveBoard"></div>
      <div class="love-words" id="loveWords"></div>
      <div class="love-message" id="loveMessage">Kéo chọn chữ để tìm từ yêu thương 💗</div>
      <button class="back-btn" onclick="backToCard()">⬅ Quay lại thiệp</button>
    </div>
  </div>
  <script>

    function showGame() {
      document.getElementById("main").style.display = "none";
      document.getElementById("videoBtn").style.display = "none";
      document.getElementById("gameScreen").style.display = "flex";
      initLoveWordGame();
    }

    function backToCard() {
      document.getElementById("gameScreen").style.display = "none";
      document.getElementById("main").style.display = "flex";
      if (document.getElementById("card").style.display === "flex" || document.getElementById("card").style.display === "block") {
        document.getElementById("videoBtn").style.display = "block";
      }
    }

    let loveGameStarted = false;

    function initLoveWordGame() {
      if (loveGameStarted) return;
      loveGameStarted = true;

      const gameSize = 12;
      const gameWords = ["LOVE", "HEART", "COUPLE", "SWEET", "KISS", "HUG", "DATE", "FOREVER"];
      const gameBoard = Array.from({ length: gameSize }, () => Array(gameSize).fill(""));
      const gameDirections = [[0, 1], [1, 0], [1, 1], [1, -1]];
      const gameLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      function placeGameWord(word) {
        let placed = false;
        while (!placed) {
          const dir = gameDirections[Math.floor(Math.random() * gameDirections.length)];
          const row = Math.floor(Math.random() * gameSize);
          const col = Math.floor(Math.random() * gameSize);
          const endRow = row + dir[0] * (word.length - 1);
          const endCol = col + dir[1] * (word.length - 1);

          if (endRow < 0 || endRow >= gameSize || endCol < 0 || endCol >= gameSize) continue;

          let canPlace = true;
          const positions = [];

          for (let i = 0; i < word.length; i++) {
            const r = row + dir[0] * i;
            const c = col + dir[1] * i;
            if (gameBoard[r][c] !== "" && gameBoard[r][c] !== word[i]) {
              canPlace = false;
              break;
            }
            positions.push([r, c]);
          }

          if (canPlace) {
            positions.forEach(([r, c], i) => gameBoard[r][c] = word[i]);
            placed = true;
          }
        }
      }

      gameWords.forEach(placeGameWord);

      for (let r = 0; r < gameSize; r++) {
        for (let c = 0; c < gameSize; c++) {
          if (gameBoard[r][c] === "") {
            gameBoard[r][c] = gameLetters[Math.floor(Math.random() * gameLetters.length)];
          }
        }
      }

      const boardEl = document.getElementById("loveBoard");
      const wordsEl = document.getElementById("loveWords");
      const messageEl = document.getElementById("loveMessage");
      let isDragging = false;
      let selectedCells = [];

      function renderGameBoard() {
        boardEl.innerHTML = "";
        for (let r = 0; r < gameSize; r++) {
          for (let c = 0; c < gameSize; c++) {
            const cell = document.createElement("div");
            cell.className = "love-cell";
            cell.textContent = gameBoard[r][c];
            cell.dataset.gameRow = r;
            cell.dataset.gameCol = c;
            cell.addEventListener("mousedown", startSelect);
            cell.addEventListener("mouseenter", dragSelect);
            cell.addEventListener("mouseup", endSelect);
            cell.addEventListener("touchstart", startTouch, { passive: false });
            cell.addEventListener("touchmove", moveTouch, { passive: false });
            cell.addEventListener("touchend", endSelect);
            boardEl.appendChild(cell);
          }
        }
      }

      function renderGameWords() {
        wordsEl.innerHTML = "";
        gameWords.forEach(word => {
          const div = document.createElement("div");
          div.className = "love-word";
          div.id = "love-word-" + word;
          div.textContent = word;
          wordsEl.appendChild(div);
        });
      }

      function startSelect(e) {
        isDragging = true;
        clearSelection();
        selectCell(e.target);
      }

      function dragSelect(e) {
        if (!isDragging || selectedCells.length === 0) return;
        selectLine(selectedCells[0], e.target);
      }

      function endSelect() {
        if (!isDragging) return;
        isDragging = false;
        checkSelectedWord();
      }

      function selectCell(cell) {
        if (!cell.classList.contains("love-cell")) return;
        cell.classList.add("selected");
        selectedCells = [cell];
      }

      function selectLine(startCell, endCell) {
        clearSelection();
        const r1 = Number(startCell.dataset.gameRow);
        const c1 = Number(startCell.dataset.gameCol);
        const r2 = Number(endCell.dataset.gameRow);
        const c2 = Number(endCell.dataset.gameCol);
        const dr = Math.sign(r2 - r1);
        const dc = Math.sign(c2 - c1);

        if (!(r1 === r2 || c1 === c2 || Math.abs(r2 - r1) === Math.abs(c2 - c1))) {
          selectedCells = [startCell];
          startCell.classList.add("selected");
          return;
        }

        selectedCells = [];
        let r = r1;
        let c = c1;
        while (true) {
          const cell = getGameCell(r, c);
          cell.classList.add("selected");
          selectedCells.push(cell);
          if (r === r2 && c === c2) break;
          r += dr;
          c += dc;
        }
      }

      function checkSelectedWord() {
        const selectedWord = selectedCells.map(cell => cell.textContent).join("");
        const reversedWord = selectedWord.split("").reverse().join("");
        const found = gameWords.find(word => word === selectedWord || word === reversedWord);

        if (found) {
          selectedCells.forEach(cell => {
            cell.classList.remove("selected");
            cell.classList.add("found");
          });
          document.getElementById("love-word-" + found).classList.add("done");
          messageEl.textContent = "Đúng rồi! Tìm thấy: " + found + " 💖";
          if (document.querySelectorAll(".love-word.done").length === gameWords.length) {
            messageEl.textContent = "Hoàn thành rồi! Tình yêu quá đỉnh 💝🎉";
          }
        } else {
          clearSelection();
          messageEl.textContent = "Chưa đúng, thử lại nhé 💕";
        }
      }

      function clearSelection() {
        document.querySelectorAll(".love-cell.selected").forEach(cell => cell.classList.remove("selected"));
      }

      function getGameCell(r, c) {
        return document.querySelector(`[data-game-row="${r}"][data-game-col="${c}"]`);
      }

      function startTouch(e) {
        e.preventDefault();
        isDragging = true;
        clearSelection();
        selectCell(e.target);
      }

      function moveTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains("love-cell") && selectedCells.length > 0) {
          selectLine(selectedCells[0], el);
        }
      }

      document.addEventListener("mouseup", endSelect);
      renderGameBoard();
      renderGameWords();
    }

    async function sha256(text) {
      // Convert string to UTF-8 bytes
      const encoder = new TextEncoder();
      const data = encoder.encode(text);

      // Hash the data
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);

      // Convert buffer to byte array
      const hashArray = Array.from(new Uint8Array(hashBuffer));

      // Convert bytes to hex string
      const hashHex = hashArray
        .map(byte => byte.toString(16).padStart(2, "0"))
        .join("");

      return hashHex;
    }

    async function checkPassword(inputPassword) {
      // Hardcoded SHA-256 hash
      const expectedHash =
        "05744ee6ac5e4d4d6fe17c3a30ff222ac662743a1753c992914ca8a034ae9f66";

      const inputHash = await sha256(inputPassword);

      return inputHash === expectedHash;
    }

    async function checkPass() {
      const isCorrect = await checkPassword(document.getElementById("pass").value);

      if (isCorrect) {

        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "flex";
        document.getElementById("matrix").style.display = "block";

        startCountdown();

      } else {
        alert("Sai mật khẩu 😢");
      }
    }

    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "LOVE0405HAPPYBIRTHDAY";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let i = 0; i < columns; i++) drops[i] = 1;

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ff8ac8";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 40);

    function openGift() {
      document.getElementById("openGiftBtn").style.display = "none";
      document.getElementById("card").style.display = "flex";
      document.getElementById("videoBtn").style.display = "block";
      setInterval(createHeart, 300);
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.bottom = "-20px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }

    function startCountdown() {
      const birthday = new Date("2026-05-04 00:00:00").getTime();

      setInterval(() => {
        const now = new Date().getTime();
        const d = birthday - now;

        if (d <= 0) {
          document.getElementById("countdown").innerHTML =
            "Hôm nay là sinh nhật em rồi 🎂💖";
          return;
        }

        const day = Math.floor(d / (1000 * 60 * 60 * 24));
        const h = Math.floor((d / (1000 * 60 * 60)) % 24);
        const m = Math.floor((d / (1000 * 60)) % 60);
        const s = Math.floor((d / 1000) % 60);

        document.getElementById("countdown").innerHTML =
          `Còn ${day} ngày ${h} giờ ${m} phút ${s} giây 🎁`;
      }, 1000);
    }

    function openVideoPopup() {
      document.getElementById("videoPopup").style.display = "flex";
      document.getElementById("videoFrame").src =
        "https://drive.google.com/embeddedfolderview?id=1HSmC_K3804Aw_oMfMk6GnUilAFHBC9k4#grid";
    }

    function closeVideoPopup() {
      document.getElementById("videoPopup").style.display = "none";
      document.getElementById("videoFrame").src = "";
    }

    window.onresize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };

    window.addEventListener("DOMContentLoaded", () => {
      const music = document.getElementById("bgMusic");
      const btn = document.getElementById("playPauseBtn");

      music.volume = 0;

      // Try playing immediately just in case the browser allows it
      music.play().then(() => {
        btn.innerText = "⏸️";
        let vol = 0;
        const fade = setInterval(() => {
          if (vol < 1) {
            vol += 0.05;
            music.volume = Math.min(1, vol);
          } else {
            clearInterval(fade);
          }
        }, 200);
      }).catch(e => {
        // Autoplay blocked, button remains ▶️
      });
    });

    function togglePlayPause() {
      const music = document.getElementById("bgMusic");
      const btn = document.getElementById("playPauseBtn");

      if (music.paused) {
        music.play();
        btn.innerText = "⏸️";
        music.volume = 1; // Set volume to 100% when manually played
      } else {
        music.pause();
        btn.innerText = "▶️";
      }
    }
  </script>

</body>

</html>
